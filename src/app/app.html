<div class="flex h-screen bg-slate-950 overflow-hidden font-sans selection:bg-indigo-500/30">
  
  <!-- Global Ethereal Background -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
    <div class="absolute top-[20%] -left-[10%] w-[40vw] h-[40vh] bg-indigo-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[10%] right-[10%] w-[30vw] h-[50vh] bg-emerald-500/10 rounded-full blur-[150px]"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20"></div>
  </div>

  <!-- Sidebar Moderno con Glassmorfismo -->
  <aside class="relative z-20 w-72 h-full flex flex-col backdrop-blur-3xl bg-slate-950/40 border-r border-white/5 shadow-[10px_0_30px_rgba(0,0,0,0.5)] transition-all duration-300">
    
    <!-- Logo / Branding -->
    <div class="p-8 flex items-center gap-4 border-b border-white/5 bg-gradient-to-b from-white/5 to-transparent">
      <div class="relative flex items-center justify-center w-12 h-12 bg-gradient-to-tr from-indigo-500 to-teal-400 rounded-2xl shadow-[0_0_20px_rgba(99,102,241,0.5)]">
        <span class="text-white font-black text-2xl tracking-tighter">M</span>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-white tracking-tight leading-none bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 to-teal-200">
          MINERVA
        </h1>
        <p class="text-[10px] uppercase font-bold text-indigo-400 tracking-[0.2em] mt-1">Ecosystem 2.0</p>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto hide-scrollbar">
      <p class="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Módulos Core</p>
      
      <!-- Link: Inventario -->
      <a routerLink="/inventory" 
         routerLinkActive="bg-indigo-600/20 text-indigo-300 border-indigo-500/50 shadow-[0_0_15px_rgba(99,102,241,0.2)]" 
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200 transition-all duration-300 group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
        <span class="font-medium">Panel Inventario</span>
      </a>

      <!-- Link: Ventas -->
      <a routerLink="/sales" 
         routerLinkActive="bg-purple-600/20 text-purple-300 border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.2)]"
         class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200 transition-all duration-300 group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
        <span class="font-medium">Control Ventas</span>
      </a>

      <!-- Link: Proveedores -->
      <a routerLink="/suppliers" 
         routerLinkActive="bg-teal-600/20 text-teal-300 border-teal-500/50 shadow-[0_0_15px_rgba(20,184,166,0.2)]"
         class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-slate-400 hover:bg-white/5 hover:text-slate-200 transition-all duration-300 group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
        <span class="font-medium">C. Suministro</span>
      </a>
    </nav>

    <!-- Usuario Bottom -->
    <div class="p-6 border-t border-white/5 bg-black/20">
      <div class="flex items-center gap-3 cursor-pointer group">
        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center overflow-hidden group-hover:border-indigo-400 transition-colors">
          <img src="https://ui-avatars.com/api/?name=Admin+Minerva&background=4F46E5&color=fff" alt="User">
        </div>
        <div>
          <p class="text-sm font-bold text-slate-200">Admin General</p>
          <p class="text-xs text-slate-500">Logistics & Supply</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Área Principal de Contenido (Módulos) -->
  <main class="relative z-10 flex-1 h-full overflow-y-auto w-full">
    <router-outlet></router-outlet>
  </main>
</div>
